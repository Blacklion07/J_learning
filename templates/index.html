<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>LowtabAI — Персонажи</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    /* UI o‘sha-o‘sha (siz yoqtirgan) */
    :root{
      --bg:#070a12; --glass: rgba(255,255,255,.06); --border: rgba(255,255,255,.12);
      --text:#eaf2ff; --muted:#a6b6d6; --p:#00e5ff; --s:#b400ff; --danger:#ff0055;
      --shadow: 0 25px 80px rgba(0,0,0,.55); --r: 22px;
    }
    *{box-sizing:border-box;margin:0;padding:0;font-family:Outfit,system-ui,Segoe UI,sans-serif}
    body{background: radial-gradient(circle at top, #0c1633, var(--bg)); color:var(--text); height:100vh; overflow:hidden;}
    .stage{width:min(100vw, calc(100vh * 16 / 9)); height:min(100vh, calc(100vw * 9 / 16));
      margin:auto; position:relative; top:50%; transform:translateY(-50%);
      border-radius: calc(var(--r) + 10px); overflow:hidden; box-shadow: var(--shadow);
      border:1px solid rgba(255,255,255,.10);
      background: linear-gradient(135deg, rgba(0,229,255,.06), rgba(180,0,255,.06));
    }
    .stage::before{content:""; position:absolute; inset:-60%;
      background:
        radial-gradient(circle at 20% 30%, rgba(0,229,255,.35), transparent 45%),
        radial-gradient(circle at 70% 70%, rgba(180,0,255,.30), transparent 45%),
        radial-gradient(circle at 50% 10%, rgba(255,0,85,.18), transparent 40%);
      filter: blur(60px);
      animation: float 10s ease-in-out infinite alternate;
    }
    @keyframes float{ from{transform:translate(0,0) scale(1)} to{transform:translate(80px,60px) scale(1.06)} }
    .app{position:absolute; inset:0; padding: 22px; display:flex; flex-direction:column; gap: 14px; z-index:1;}
    .topbar{display:flex; align-items:center; justify-content:space-between; padding: 14px 16px;
      background: var(--glass); border:1px solid var(--border); border-radius: var(--r); backdrop-filter: blur(16px);}
    .brand{display:flex; flex-direction:column; gap:2px;}
    .brand .t{font-weight:800; letter-spacing:.5px; font-size:18px}
    .brand .s{font-size:12px; color:var(--muted)}
    .who{font-size:12px; color:var(--muted); padding: 10px 12px; border:1px solid var(--border);
      border-radius: 999px; background: rgba(0,0,0,.25);}
    .main{flex:1; display:grid; grid-template-columns: 1.15fr .85fr; gap: 14px; min-height: 0;}
    .panel{background: var(--glass); border:1px solid var(--border); border-radius: var(--r);
      backdrop-filter: blur(16px); overflow:hidden; min-height: 0; display:flex; flex-direction:column;}
    .panelHead{padding: 14px 16px; border-bottom:1px solid rgba(255,255,255,.10); display:flex; justify-content:space-between; align-items:center;}
    .panelHead .h{font-weight:700;}
    .panelHead .note{font-size:12px; color:var(--muted);}
    .grid{padding: 14px; display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px;}
    .card{height: 165px; border-radius: 18px; border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.22); overflow:hidden; cursor:pointer; position:relative; transition: .2s;}
    .card:hover{ transform: translateY(-2px); border-color: rgba(0,229,255,.35); }
    .card.active{ outline:2px solid rgba(0,229,255,.55); }
    .portrait{position:absolute; inset:0;
      background:
        radial-gradient(circle at 30% 30%, rgba(0,229,255,.16), transparent 55%),
        radial-gradient(circle at 70% 80%, rgba(180,0,255,.14), transparent 55%),
        linear-gradient(135deg, rgba(255,255,255,.06), rgba(0,0,0,.15));
      transform: scale(1.05); filter: saturate(1.1); animation: shimmer 4s ease-in-out infinite alternate;
    }
    @keyframes shimmer{ from{filter:blur(0px) brightness(1)} to{filter:blur(.2px) brightness(1.05)} }
    .cardInfo{position:absolute; left:0; right:0; bottom:0; padding: 12px 12px;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,.72));}
    .cardInfo .name{font-weight:800}
    .cardInfo .tag{font-size:12px; color: rgba(255,255,255,.78); margin-top:3px}
    .panelFooter{margin-top:auto; padding: 12px 14px; border-top:1px solid rgba(255,255,255,.10);
      font-size:12px; color: var(--muted);}
    .chatWrap{background: var(--glass); border:1px solid var(--border); border-radius: var(--r);
      backdrop-filter: blur(16px); display:flex; flex-direction:column; overflow:hidden; min-height: 0;}
    .chatHead{padding: 14px 16px; border-bottom:1px solid rgba(255,255,255,.10);
      display:flex; align-items:center; justify-content:space-between; gap: 10px;}
    .status{font-size:12px; color: var(--muted); min-height: 16px}
    .actions{display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end}
    .btn{border:none; border-radius: 14px; padding: 10px 12px; cursor:pointer; color: #fff;
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); transition:.2s; font-size:12px;}
    .btn:hover{ transform: translateY(-1px); }
    .btn.danger{ background: rgba(255,0,85,.20); border:1px solid rgba(255,0,85,.35); }
    .chat{flex:1; padding: 14px 16px; overflow:auto; min-height: 0; line-height: 1.5;}
    .msg{ margin:0 0 12px 0; white-space:pre-wrap; }
    .me{ color:#9adfff; }
    .ai{ color: var(--text); }
    .inputRow{padding: 12px 12px; border-top:1px solid rgba(255,255,255,.10); display:flex; gap: 10px; align-items:center;}
    input{flex:1; padding: 12px 14px; border-radius: 14px; border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.20); color: var(--text); outline:none;}
    input::placeholder{ color: rgba(255,255,255,.45); }
    .mic{ width: 54px; background: linear-gradient(45deg,#ff512f,#dd2476); border:none; }
    .send{ width: 54px; border:none; background: linear-gradient(45deg, var(--p), #0088ff); }
    @media (max-width: 980px){
      .main{ grid-template-columns: 1fr; }
      .grid{ grid-template-columns: repeat(2, 1fr); }
      .card{ height: 150px; }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="app">
      <div class="topbar">
        <div class="brand">
          <div class="t">LOWTAB AI</div>
          <div class="s">Русская озвучка • чистим символы • харизма по персонажу</div>
        </div>
        <div class="who" id="who">Персонаж: не выбран</div>
      </div>

      <div class="main">
        <div class="panel">
          <div class="panelHead">
            <div class="h">Персонажи (6)</div>
            <div class="note">3 сверху + 3 снизу</div>
          </div>
          <div class="grid" id="grid"></div>
          <div class="panelFooter">
            Истории чатов сохраняются на этом устройстве. Символы для озвучки очищаются автоматически.
          </div>
        </div>

        <div class="chatWrap">
          <div class="chatHead">
            <div class="status" id="status">Выбери персонажа слева и напиши сообщение.</div>
            <div class="actions">
              <button class="btn" onclick="stopSpeech()">🔇 Стоп звук</button>
              <button class="btn danger" onclick="clearCurrentChat()">🗑 Очистить чат</button>
            </div>
          </div>

          <div class="chat" id="chatBox">
            <p class="msg ai">Привет 🙂 Выбери персонажа — и начнём.</p>
          </div>

          <div class="inputRow">
            <input id="input" placeholder="Напиши сюда..." />
            <button class="btn mic" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="btn send" onclick="sendMessage()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  const BASE_URL = "";

  const grid = document.getElementById("grid");
  const who = document.getElementById("who");
  const statusEl = document.getElementById("status");
  const chatBox = document.getElementById("chatBox");
  const input = document.getElementById("input");
  const micBtn = document.getElementById("micBtn");

  let personas = [];
  let currentPersona = null;

  // --------- localStorage (per persona) ----------
  const LS_KEY = "lowtab_persona_chats_v2";
  const loadStore = () => { try { return JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch { return {}; } };
  const saveStore = (s) => localStorage.setItem(LS_KEY, JSON.stringify(s));
  const getChat = (id) => (loadStore()[id] || []);
  const setChat = (id, msgs) => { const s = loadStore(); s[id]=msgs; saveStore(s); };
  const appendChat = (id, role, content) => { const msgs=getChat(id); msgs.push({role, content, ts:Date.now()}); setChat(id, msgs); };

  function renderChat(id){
    chatBox.innerHTML = "";
    const msgs = getChat(id);
    if(!msgs.length){
      const p=document.createElement("p");
      p.className="msg ai";
      p.textContent="Начнём 🙂 Напиши сообщение.";
      chatBox.appendChild(p);
      return;
    }
    msgs.forEach(m=>{
      const p=document.createElement("p");
      p.className="msg "+(m.role==="user"?"me":"ai");
      p.textContent=(m.role==="user"?"Вы: ":"AI: ")+m.content;
      chatBox.appendChild(p);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function clearCurrentChat(){
    if(!currentPersona) return;
    setChat(currentPersona.id, []);
    renderChat(currentPersona.id);
    setStatus("Чат очищен.");
  }

  function setStatus(t){ statusEl.textContent = t; }

  function selectPersona(p){
    currentPersona = p;
    who.textContent = `Персонаж: ${p.label}`;
    document.querySelectorAll(".card").forEach(el => el.classList.remove("active"));
    const card = document.querySelector(`.card[data-id="${p.id}"]`);
    if(card) card.classList.add("active");
    renderChat(p.id);
    setStatus(`Вы выбрали: ${p.label}. Напиши сообщение.`);
  }

  // --------- Better RU voice selection ----------
  let bestVoice = null;

  function voiceScore(v){
    const name = (v.name||"").toLowerCase();
    const lang = (v.lang||"").toLowerCase();
    let s = 0;
    if(lang === "ru-ru") s += 50;
    else if(lang.startsWith("ru")) s += 35;
    if(name.includes("google")) s += 30;
    if(name.includes("microsoft")) s += 25;
    if(name.includes("yandex")) s += 25;
    if(name.includes("premium")) s += 15;
    if(name.includes("neural")) s += 15;
    if(v.localService) s += 5;
    return s;
  }

  function pickBestVoice(){
    const voices = speechSynthesis.getVoices() || [];
    if(!voices.length) return null;
    const ru = voices.filter(v => (v.lang||"").toLowerCase().startsWith("ru"));
    const pool = ru.length ? ru : voices;
    pool.sort((a,b)=>voiceScore(b)-voiceScore(a));
    return pool[0] || null;
  }

  function initVoices(){ bestVoice = pickBestVoice(); }
  speechSynthesis.onvoiceschanged = initVoices;
  initVoices();

  function stopSpeech(){
    if(speechSynthesis.speaking || speechSynthesis.pending) speechSynthesis.cancel();
  }

  // extra frontend sanitize (if backend didn't)
  function sanitizeForTTS(text){
    return (text||"")
      .replace(/```[\s\S]*?```/g, " ")
      .replace(/https?:\/\/\S+/g, " ")
      .replace(/[*+/=\\|<>~^_`]/g, " ")
      .replace(/[-–—]+/g, " ")
      .replace(/\s+/g, " ")
      .trim()
      .slice(0, 900);
  }

  function speak(text, tts){
    stopSpeech();
    if(!tts || tts.enabled === false) return;

    const clean = sanitizeForTTS(text);
    if(!clean) return;

    const u = new SpeechSynthesisUtterance(clean);
    u.lang = tts.lang || "ru-RU";

    if(!bestVoice) bestVoice = pickBestVoice();
    if(bestVoice) u.voice = bestVoice;

    u.rate = (typeof tts.rate === "number") ? tts.rate : 1.0;
    u.pitch = (typeof tts.pitch === "number") ? tts.pitch : 1.0;
    u.volume = (typeof tts.volume === "number") ? tts.volume : 1.0;

    speechSynthesis.speak(u);
  }

  // --------- backend ----------
  async function loadPersonas(){
    const res = await fetch(`${BASE_URL}/personas`);
    const data = await res.json();
    personas = data.personas || [];
    grid.innerHTML = "";

    personas.forEach(p=>{
      const d = document.createElement("div");
      d.className = "card";
      d.dataset.id = p.id;
      d.innerHTML = `
        <div class="portrait"></div>
        <div class="cardInfo">
          <div class="name">${p.label}</div>
          <div class="tag">${p.tagline}</div>
        </div>
      `;
      d.onclick = ()=>selectPersona(p);
      grid.appendChild(d);
    });

    if(personas.length) selectPersona(personas[0]);
  }

  function buildHistoryForAPI(id){
    return getChat(id).slice(-10).map(m => ({
      role: m.role === "user" ? "user" : "assistant",
      content: m.content
    }));
  }

  async function sendMessage(){
    const text = (input.value || "").trim();
    if(!text) return;
    if(!currentPersona){ setStatus("Сначала выбери персонажа."); return; }

    input.value = "";
    appendChat(currentPersona.id, "user", text);
    renderChat(currentPersona.id);
    setStatus("Думаю...");

    try{
      const payload = { persona: currentPersona.id, message: text, history: buildHistoryForAPI(currentPersona.id) };
      const res = await fetch(`${BASE_URL}/chat`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      const answer = (data.response || "").trim() || "…";
      appendChat(currentPersona.id, "assistant", answer);
      renderChat(currentPersona.id);
      setStatus("Готов ✅");

      // speak: prefer backend-provided tts_text
      const ttsText = (data.tts_text || answer);
      speak(ttsText, data.tts || currentPersona.tts);
    }catch(e){
      appendChat(currentPersona.id, "assistant", "Ошибка соединения с сервером.");
      renderChat(currentPersona.id);
      setStatus("Ошибка");
    }
  }

  // --------- STT (optional) ----------
  let recognition=null, listening=false;
  function toggleMic(){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition){ alert("Голосовой ввод не поддерживается. Напиши текстом 🙂"); return; }
    if(!recognition){
      recognition = new SpeechRecognition();
      recognition.lang = "ru-RU";
      recognition.interimResults = false;
      recognition.onresult = (e)=>{ input.value = e.results[0][0].transcript || ""; sendMessage(); };
      recognition.onend = ()=>{ listening=false; micBtn.textContent="🎤"; };
    }
    if(!listening){ listening=true; micBtn.textContent="🔴"; recognition.start(); }
    else recognition.stop();
  }

  input.addEventListener("keydown",(e)=>{ if(e.key==="Enter") sendMessage(); });
  loadPersonas();
</script>
</body>
</html>
